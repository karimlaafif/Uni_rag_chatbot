# ═══════════════════════════════════════════════════════════════════════════
#  application.properties — Configuration Quarkus
#  Équivalent de application.properties en Spring Boot (même fichier, même idée)
# ═══════════════════════════════════════════════════════════════════════════

# ── Serveur ──────────────────────────────────────────────────────────────
quarkus.http.port=8080
quarkus.http.host=0.0.0.0

# ── CORS (autorise le frontend React) ────────────────────────────────────
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:3000,http://localhost:5173
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Accept,Authorization,Content-Type

# ── Base de données PostgreSQL ────────────────────────────────────────────
#  Quarkus injecte ces valeurs dans le EntityManager JPA automatiquement.
#  En dev, utilise %dev. pour surcharger (voir profils plus bas).
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:uiz_admin}
quarkus.datasource.password=${DB_PASS:uiz_secret}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:uiz_users}

# Hibernate DDL : "update" en dev, "validate" en prod, "drop-and-create" pour reset
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false

# ── JWT (MicroProfile) ────────────────────────────────────────────────────
#
#  mp.jwt.verify.publickey.location : chemin vers la clé PUBLIQUE RSA
#    → utilisée pour vérifier les tokens entrants
#    → en Spring Boot c'était : jwt.public-key dans SecurityConfig
#
#  smallrye.jwt.sign.key.location : chemin vers la clé PRIVÉE RSA
#    → utilisée pour SIGNER les tokens au login
#    → seul le serveur la connaît — NE JAMAIS la committer en prod
#
mp.jwt.verify.publickey.location=META-INF/resources/publicKey.pem
mp.jwt.verify.issuer=https://uiz.ac.ma
smallrye.jwt.sign.key.location=META-INF/resources/privateKey.pem

# Durée de validité du token (en secondes) : 8 heures
smallrye.jwt.new-token.lifespan=28800

# ── Client HTTP vers Python RAG ───────────────────────────────────────────
#
#  MicroProfile Rest Client : chaque interface annotée @RegisterRestClient
#  a une URL configurée ici. Le nom de la clé est le nom simple de l'interface.
#
ma.uiz.client.RagEngineClient/mp-rest/url=${RAG_ENGINE_URL:http://localhost:8000}
ma.uiz.client.RagEngineClient/mp-rest/connectTimeout=5000
ma.uiz.client.RagEngineClient/mp-rest/readTimeout=60000

# ── Profil DEV (actif avec mvn quarkus:dev) ───────────────────────────────
#  Les propriétés préfixées par %dev. écrasent les valeurs par défaut.
%dev.quarkus.hibernate-orm.log.sql=true
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/uiz_dev
%dev.quarkus.http.cors.origins=*

# ── Profil TEST ───────────────────────────────────────────────────────────
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:test;DB_CLOSE_DELAY=-1
%test.quarkus.hibernate-orm.database.generation=drop-and-create

# ── Health checks ─────────────────────────────────────────────────────────
quarkus.smallrye-health.root-path=/q/health

# ── Swagger UI / OpenAPI ──────────────────────────────────────────────────
# Activé en dev seulement (désactivé automatiquement en prod)
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/q/swagger-ui
quarkus.smallrye-openapi.info-title=UIZ RAG Backend API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=Backend Jakarta EE du chatbot RAG de l'Université Ibn Zohr

# ── Logging ───────────────────────────────────────────────────────────────
quarkus.log.level=INFO
quarkus.log.category."ma.uiz".level=DEBUG
